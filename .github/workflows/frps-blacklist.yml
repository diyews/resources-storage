# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.20'

    - name: Build
      run: CGO_ENABLED=0 go build -v -ldflags="-s -w -extldflags '-static'" -o frps-blacklist go_server/frps_blacklist.go

    - uses: actions/upload-artifact@v4
      with: 
        name: frps-blacklist
        path: |
          frps-blacklist
          go_server/frps_blacklist.service
